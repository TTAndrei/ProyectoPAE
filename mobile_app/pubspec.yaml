name: pae_mobile
description: Mobile Flutter client for PAE last-mile operations
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_map: ^8.3.0
  http: ^1.2.1
  latlong2: ^0.9.1
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  web_socket_channel: ^3.0.1
  geolocator: ^14.0.2
  google_fonts: ^8.1.0
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env